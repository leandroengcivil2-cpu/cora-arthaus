<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<title>Corá Arthaus — Histograma</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
:root{--bg:#0a0a0a;--bg2:#111;--bg3:#161616;--bg4:#1c1c1c;--border:#222;--border2:#333;--gold:#c9a96e;--gold2:#b8944f;--white:#f0f0f0;--gray:#999;--gray2:#666;--gray3:#444;--green:#4ade80;--green2:#22c55e;--red:#f87171;--red2:#ef4444;--yellow:#fbbf24;--font:'DM Sans',-apple-system,sans-serif;--font-display:'Playfair Display',Georgia,serif;--safe-bottom:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--white);font-family:var(--font);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
input,select,button,textarea{font-family:var(--font)}
input[type="date"],input[type="month"],input[type="number"],input[type="text"],select{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--white);padding:10px 12px;font-size:14px;width:100%;outline:none;transition:border-color .2s;text-transform:uppercase}
input:focus,select:focus{border-color:var(--gold)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .4s ease-out}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:6px 0 calc(6px + var(--safe-bottom));z-index:100}
.nav-btn{background:none;border:none;color:var(--gray2);display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;cursor:pointer;padding:4px 12px;font-weight:500}
.nav-btn.active{color:var(--gold)}
main{padding:0 0 80px 0}
.page{padding:16px}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px 12px;text-align:center}
.stat-value{font-size:26px;font-weight:700;line-height:1;font-family:var(--font-display)}
.stat-label{font-size:10px;color:var(--gray);margin-top:4px;font-weight:600}
.stat-sub{font-size:9px;color:var(--gray2);margin-top:2px}
.action-btn{background:var(--bg4);color:var(--white);border:1px solid var(--border2);border-radius:10px;padding:14px 16px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:12px;width:100%;text-align:left}
.action-btn:active{transform:scale(.98)}
.action-btn.primary{background:var(--gold);color:#000;border:none}
.list-item{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.status-btn{width:40px;height:40px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:700}
.status-btn:active{transform:scale(.9)}
.mini-stat{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;text-align:center;flex:1;min-width:65px}
.tabs{display:flex;border-radius:10px;overflow:hidden;border:1px solid var(--border2);margin-bottom:16px}
.tab-btn{flex:1;padding:11px 8px;font-size:12px;font-weight:600;border:none;cursor:pointer;letter-spacing:.3px}
.tab-btn.active{background:var(--gold);color:#000}
.tab-btn:not(.active){background:var(--bg4);color:var(--gray)}
.section-title{font-size:12px;font-weight:700;color:var(--white);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.data-table{width:100%;border-collapse:collapse;font-size:11px}
.data-table th{padding:10px 6px;color:var(--gray);font-weight:600;text-align:center;font-size:10px;text-transform:uppercase;border-bottom:1px solid var(--border2)}
.data-table td{padding:10px 6px;color:var(--gray);text-align:center;border-bottom:1px solid var(--bg3)}
.data-table th:first-child,.data-table td:first-child{text-align:left}
.sm-btn{background:transparent;border:1px solid var(--border2);border-radius:8px;color:var(--gray);padding:8px 14px;font-size:11px;font-weight:600;cursor:pointer;flex:1}
.add-btn{background:var(--gold);border:none;border-radius:8px;padding:10px 14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;font-weight:600;color:#000;width:100%}
.del-btn{background:none;border:none;cursor:pointer;padding:6px;opacity:.5}
.del-btn:active{opacity:1}
.group-header{font-size:11px;font-weight:700;color:var(--gold);margin-bottom:8px;text-transform:uppercase;letter-spacing:1.5px}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:200;animation:fadeIn .3s;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.toast-ok{background:var(--green2);color:#000}.toast-err{background:var(--red2);color:#fff}
.num-input{width:64px;background:var(--bg4);border:1px solid var(--border2);border-radius:8px;color:var(--gold);padding:8px;font-size:16px;font-weight:700;text-align:center}
.prev-total{background:var(--bg4);border:1px solid var(--border2);border-radius:10px;padding:14px 18px;margin-top:14px;display:flex;justify-content:space-between;align-items:center}
.loading{text-align:center;padding:40px;color:var(--gray2)}
.loading-spin{display:inline-block;width:24px;height:24px;border:3px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Hero home layout */
.hero-home{display:flex;align-items:stretch;gap:16px;margin-bottom:20px;padding:16px;background:var(--bg3);border:1px solid var(--border);border-radius:14px}
.hero-home img.predio{width:55%;max-height:220px;object-fit:cover;border-radius:10px;flex-shrink:0}
.hero-info{flex:1;display:flex;flex-direction:column;justify-content:center}
.hero-logo{height:28px;border-radius:4px;margin-bottom:8px}
/* Func distribution chart */
.func-chart-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.func-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.func-bar-label{font-size:10px;color:var(--gray);width:90px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.func-bar-track{flex:1;height:18px;background:var(--bg4);border-radius:4px;overflow:hidden;position:relative}
.func-bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#000;min-width:18px;transition:width .4s}
.func-bar-count{font-size:11px;font-weight:700;color:var(--white);width:24px;text-align:center;flex-shrink:0}
/* Chart improved */
.chart-box{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:20px 12px 12px;margin-bottom:16px;overflow-x:auto}
.daily-bar-group{display:flex;flex-direction:column;align-items:center;min-width:52px;flex:1}
.daily-bar-area{display:flex;align-items:flex-end;gap:3px}
.daily-prev-bar{width:20px;border-radius:4px 4px 0 0;background:var(--border2);position:relative}
.daily-real-bar{width:20px;border-radius:4px 4px 0 0;position:relative}
.bar-val{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;white-space:nowrap}
.daily-day{font-size:10px;color:var(--gray2);margin-top:6px;font-weight:500}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--gray)}
.legend-dot{width:12px;height:12px;border-radius:3px}
/* Monthly cards */
.monthly-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px}
.monthly-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.monthly-bar-bg{height:24px;background:var(--bg4);border-radius:6px;position:relative;overflow:hidden;margin-bottom:6px}
.monthly-bar-fill{height:100%;border-radius:6px;transition:width .6s;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:10px;font-weight:700}
.monthly-bar-target{position:absolute;top:0;height:100%;border-right:2px dashed var(--white);opacity:.4}
.monthly-stats{display:flex;gap:12px;font-size:11px;color:var(--gray)}
.monthly-stats span{display:flex;align-items:center;gap:3px}
@media(min-width:768px){.page{max-width:640px;margin:0 auto}}
.emp-pill{padding:5px 11px;border-radius:16px;border:1px solid var(--border2);background:var(--bg2);color:var(--gray);font-size:10px;font-weight:600;cursor:pointer;letter-spacing:.4px;transition:.15s}
.emp-pill.active{border-color:var(--gold);color:var(--gold);background:rgba(201,169,110,.12)}
</style>
</head>

  },
  delDiaria(data,cid){return this.req(`diarias?data=eq.${data}&colaborador_id=eq.${cid}`,'DELETE')},
};

function mk(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`}

function isWk(k){const d=new Date(k+'T12:00:00').getDay();return d===0||d===6}
function clean(v){return(v||'').replace(/\D/g,'')}
function fmtCnpj(v){const d=clean(v).slice(0,14);if(d.length>12)return d.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d+)/,'$1.$2.$3/$4-$5');if(d.length>8)return d.replace(/^(\d{2})(\d{3})(\d{3})(\d+)/,'$1.$2.$3/$4');if(d.length>5)return d.replace(/^(\d{2})(\d{3})(\d+)/,'$1.$2.$3');if(d.length>2)return d.replace(/^(\d{2})(\d+)/,'$1.$2');return d}
function fmtCpf(v){const d=clean(v).slice(0,11);if(d.length>9)return d.replace(/^(\d{3})(\d{3})(\d{3})(\d+)/,'$1.$2.$3-$4');if(d.length>6)return d.replace(/^(\d{3})(\d{3})(\d+)/,'$1.$2.$3');if(d.length>3)return d.replace(/^(\d{3})(\d+)/,'$1.$2');return d}

async function autoPopulateDay(date){
  if(date>dk(new Date()))return;
  if(S.chamadas.some(c=>c.data===date))return;
  let prevChs=[];
  const prevDates=[...new Set(S.chamadas.map(c=>c.data))].filter(d=>d<date).sort().reverse();
  if(prevDates.length){
    prevChs=S.chamadas.filter(c=>c.data===prevDates[0]);
  }else{
    try{
      const[y,m]=date.split('-').map(Number);
      const prevMonth=`${m===1?y-1:y}-${String(m===1?12:m-1).padStart(2,'0')}`;
      const prev=await api.getChamadas(prevMonth);
      if(prev?.length){const pd=[...new Set(prev.map(c=>c.data))].sort().reverse();prevChs=prev.filter(c=>c.data===pd[0]);}
    }catch(e){}
  }
  if(!prevChs.length)return;
  for(const ch of prevChs){
    try{
      await api.upsertChamada({data:date,colaborador_id:ch.colaborador_id,status:'P',motivo:''});
      S.chamadas.push({data:date,colaborador_id:ch.colaborador_id,status:'P',motivo:''});
    }catch(e){console.error('autoPopulate:',e)}
  }
}

function rDaily(){
  const[y,m]=S.selectedMonth.split('-').map(Number);const days=dim(S.selectedMonth);
  const fE=fEmp();
  const fC=fCol();

  // Daily totals for table
  let dailyRows='';
  for(let d=1;d<=days;d++){
    const dkk=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dch=S.chamadas.filter(c=>c.data===dkk);if(!dch.length)continue;
    let tr=0;fC.forEach(c=>{const ch=dch.find(x=>x.colaborador_id===c.id);if(ch?.status==='P')tr+=1;else if(ch?.status==='M')tr+=.5});
    let tp=0;fE.forEach(e=>{const p=S.previsto.find(pr=>pr.empreiteiro_id===e.id);tp+=(p?.quantidade||0)});
    const dv=tr-tp;
    dailyRows+=`<tr><td style="text-align:left;color:var(--white)">${fd(dkk)}</td><td>${tp}</td><td style="color:var(--white);font-weight:700">${tr}</td><td style="color:${dv>=0?'var(--green)':'var(--red)'};font-weight:700">${dv>=0?'+':''}${dv}</td></tr>`;
  }

  // Per-empreiteiro chart for selected date
  const selDayChs=S.chamadas.filter(c=>c.data===S.selectedDate);
  let totalPrevDia=0,totalRealDia=0;
  const empBars=fE.map(emp=>{
    const empCols=S.colaboradores.filter(c=>c.empreiteiro_id===emp.id);
    let real=0;empCols.forEach(c=>{const ch=selDayChs.find(x=>x.colaborador_id===c.id);if(ch?.status==='P')real+=1;else if(ch?.status==='M')real+=.5});
    const prev=S.previsto.find(p=>p.empreiteiro_id===emp.id)?.quantidade||0;
    totalPrevDia+=prev;totalRealDia+=real;
    return{nome:emp.nome,id:emp.id,prev,real};
  });
  const maxBar=Math.max(...empBars.map(e=>Math.max(e.prev,e.real)),1);
  const chartH=170;
  const desvioTotal=totalRealDia-totalPrevDia;
  const desvioColor=desvioTotal>=0?'var(--green)':'var(--red)';

  const barsHtml=empBars.map(e=>{
    const pH=Math.max((e.prev/maxBar)*chartH,2);
    const rH=Math.max((e.real/maxBar)*chartH,e.real>0?2:0);
    const rColor=e.real>=e.prev?'var(--green2)':'var(--red2)';
    const abbrNome=e.nome.length>12?e.nome.slice(0,10)+'..':e.nome;
    return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;min-width:60px">
      <div style="display:flex;align-items:flex-end;gap:3px;height:${chartH}px">
        <div style="position:relative;width:24px;height:${pH}px;background:var(--bg4);border-radius:4px 4px 0 0;border:1.5px dashed var(--gray3)"><span style="position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;color:var(--gray)">${e.prev}</span></div>
        <div style="position:relative;width:24px;height:${rH}px;background:${rColor};border-radius:4px 4px 0 0"><span style="position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;color:${rColor}">${e.real}</span></div>
      </div>
      <div style="font-size:9px;color:var(--gray);margin-top:6px;text-align:center;line-height:1.2">${abbrNome}</div>
    </div>`;
  }).join('');

  // Func distribution for selected date
  const funcDistEmps=fE.filter(emp=>{
    const empCols=S.colaboradores.filter(c=>c.empreiteiro_id===emp.id);
    return empCols.some(c=>selDayChs.find(x=>x.colaborador_id===c.id&&(x.status==='P'||x.status==='M')));
  });
  const FUNC_COLORS=['#c9a96e','#5DCAA5','#e8a87c','#85B7EB','#AFA9EC','#d4a5a5','#97C459','#F09595'];
  let funcChartsHtml='';
  if(funcDistEmps.length>0){
    funcChartsHtml=`<div class="section-title" style="margin-top:20px">EFETIVO POR FUNÇÃO — ${fd(S.selectedDate)}</div>`;
    funcDistEmps.forEach((emp,ei)=>{
      const empCols=S.colaboradores.filter(c=>c.empreiteiro_id===emp.id);
      const funcCount={};
      empCols.forEach(c=>{const ch=selDayChs.find(x=>x.colaborador_id===c.id);if(ch&&(ch.status==='P'||ch.status==='M'))funcCount[c.funcao]=(funcCount[c.funcao]||0)+(ch.status==='P'?1:0.5)});
      const funcs=Object.entries(funcCount).sort((a,b)=>b[1]-a[1]);if(!funcs.length)return;
      const maxF=Math.max(...funcs.map(f=>f[1]),1);const totalEmp=funcs.reduce((a,f)=>a+f[1],0);const empColor=EMP_COLORS[ei%8];const cH=150;
      const bV=funcs.map(([func,count],fi)=>{const h=Math.max((count/maxF)*cH,30);const color=FUNC_COLORS[fi%8];
        return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;height:${cH}px;justify-content:flex-end;min-width:36px">
          <div style="width:100%;height:${h}px;background:${color};border-radius:4px 4px 0 0;display:flex;align-items:center;justify-content:center;writing-mode:vertical-rl;text-orientation:mixed;transform:rotate(180deg);overflow:hidden;padding:4px 2px">
            <span style="font-size:9px;font-weight:700;color:#000;line-height:1.1;text-align:center;word-break:break-all">${func}</span>
          </div>
        </div>`}).join('');
      const vV=funcs.map(([f,c])=>`<div style="flex:1;text-align:center;min-width:36px"><span style="font-size:14px;font-weight:700;color:var(--white)">${c}</span></div>`).join('');
      funcChartsHtml+=`<div class="func-chart-card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span style="font-size:13px;font-weight:700;color:var(--white)">${emp.nome}</span><span style="font-size:20px;font-weight:700;color:${empColor};font-family:var(--font-display)">${totalEmp}</span></div><div style="display:flex;align-items:flex-end;gap:6px;border-bottom:1px solid var(--border2)">${bV}</div><div style="display:flex;gap:6px;margin-top:6px">${vV}</div></div>`;
    });
  }

  return`<div class="section-title">PREVISTO × REALIZADO — ${fd(S.selectedDate)}</div>
    <!-- Resumo total -->
    <div class="chart-box">
      <div style="display:flex;justify-content:center;gap:20px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border2)">
        <div style="text-align:center"><div style="font-size:26px;font-weight:700;color:var(--gray);font-family:var(--font-display)">${totalPrevDia}</div><div style="font-size:10px;color:var(--gray2);letter-spacing:1px">PREVISTO</div></div>
        <div style="width:1px;background:var(--border2)"></div>
        <div style="text-align:center"><div style="font-size:26px;font-weight:700;color:${desvioColor};font-family:var(--font-display)">${totalRealDia}</div><div style="font-size:10px;color:var(--gray2);letter-spacing:1px">REALIZADO</div></div>
        <div style="width:1px;background:var(--border2)"></div>
        <div style="text-align:center"><div style="font-size:26px;font-weight:700;color:${desvioColor};font-family:var(--font-display)">${desvioTotal>=0?'+':''}${desvioTotal}</div><div style="font-size:10px;color:var(--gray2);letter-spacing:1px">DESVIO</div></div>
      </div>
      <!-- Barras por empreiteiro -->
      <div style="display:flex;gap:8px;align-items:flex-end">${barsHtml}</div>
    </div>
    <div class="legend"><div class="legend-item"><div class="legend-dot" style="background:var(--border2);border:1.5px dashed var(--gray3)"></div>PREVISTO</div><div class="legend-item"><div class="legend-dot" style="background:var(--green2)"></div>ATINGIU META</div><div class="legend-item"><div class="legend-dot" style="background:var(--red2)"></div>ABAIXO DA META</div></div>
    <div style="overflow-x:auto"><table class="data-table"><thead><tr><th style="text-align:left">DIA</th><th>PREV.</th><th>REAL.</th><th>DESVIO</th></tr></thead><tbody>${dailyRows||'<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--gray2)">SEM DADOS</td></tr>'}</tbody></table></div>
    <div style="display:flex;align-items:center;gap:8px;margin-top:20px;margin-bottom:4px"><span style="font-size:11px;color:var(--gray)">VER FUNÇÕES DO DIA:</span><input type="date" value="${S.selectedDate}" data-action="setDate" style="flex:1;font-size:12px;padding:8px"></div>
    ${funcChartsHtml}
    <button class="action-btn" style="margin-top:12px" data-action="exportDailyPdf">${ic('file',18,'#c9a96e')} EXPORTAR EFETIVO DIÁRIO (PDF)</button>`}

function rMonthly(){
  const[y,m]=S.selectedMonth.split('-').map(Number);const days=dim(S.selectedMonth);
  const today=dk(new Date());
  const fE=fEmp();

  const summary=fE.map(emp=>{
    const cols=S.colaboradores.filter(c=>c.empreiteiro_id===emp.id);
    let sumEf=0,tP=0,tF=0,tM=0,dc=0;
    for(let d=1;d<=days;d++){
      const dkk=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      if(dkk>today)break;
      const dch=S.chamadas.filter(c=>c.data===dkk);
      if(!dch.length)continue;
      dc++;
      cols.forEach(c=>{const ch=dch.find(x=>x.colaborador_id===c.id);if(ch?.status==='P'){sumEf+=1;tP++}else if(ch?.status==='F')tF++;else if(ch?.status==='M'){sumEf+=0.5;tM++}});
    }
    const ef=dc>0?Math.round((sumEf/dc)*10)/10:0;
    const pv=S.previsto.find(p=>p.empreiteiro_id===emp.id)?.quantidade||0;
    return{...emp,sumEf,tP,tF,tM,ef,dc,pv,tot:tP+tF+tM};
  });

  const tPv=fE.reduce((a,e)=>a+(S.previsto.find(p=>p.empreiteiro_id===e.id)?.quantidade||0),0);
  const tEf=Math.round(summary.reduce((a,s)=>a+s.ef,0)*10)/10;
  const tP=summary.reduce((a,s)=>a+s.tP,0),tF=summary.reduce((a,s)=>a+s.tF,0),tM=summary.reduce((a,s)=>a+s.tM,0),tR=summary.reduce((a,s)=>a+s.tot,0);
  const pct=tR>0?Math.round(tP/tR*100):0;

  const cards=summary.filter(s=>s.tot>0||s.pv>0).map(s=>{
    const pctE=s.pv>0?Math.min(Math.round((s.ef/s.pv)*100),100):s.ef>0?100:0;
    const color=s.ef>=s.pv&&s.pv>0?'var(--green2)':'var(--red2)';
    const presPct=s.tot>0?Math.round(s.tP/s.tot*100):0;
    const desvio=Math.round((s.ef-s.pv)*10)/10;
    return`<div class="monthly-card">
      <div class="monthly-header">
        <div><span style="font-weight:700;color:var(--white);font-size:13px">${s.nome}</span><div style="font-size:9px;color:var(--gray);margin-top:2px">${s.dc} DIA${s.dc!==1?'S':''} COM CHAMADA</div></div>
        <div style="text-align:right"><span style="font-size:20px;font-weight:700;color:${color};font-family:var(--font-display)">${s.ef}</span><span style="font-size:10px;color:var(--gray)"> / ${s.pv}/DIA</span><div style="font-size:10px;color:${desvio>=0?'var(--green)':'var(--red)'}">${desvio>=0?'+':''}${desvio}</div></div>
      </div>
      <div class="monthly-bar-bg"><div class="monthly-bar-fill" style="width:${pctE}%;background:${color}">${s.ef>0?s.ef:''}</div></div>
      <div class="monthly-stats"><span style="color:var(--green)">● ${s.tP} pres.</span><span style="color:var(--red)">● ${s.tF} faltas</span><span style="color:var(--yellow)">● ${s.tM} ½</span><span style="color:${presPct>=85?'var(--green)':'var(--red)'}">${presPct}%</span></div>
    </div>`;
  }).join('');

  return`<div class="section-title">RESUMO MENSAL — MÉDIA DIÁRIA</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px">
      <div class="stat-card"><div class="stat-value" style="color:var(--gold);font-size:22px">${tEf}</div><div class="stat-label">EF. MÉDIO/DIA</div><div class="stat-sub">dias c/ chamada</div></div>
      <div class="stat-card"><div class="stat-value" style="color:var(--gray2);font-size:22px">${tPv}</div><div class="stat-label">PREVISTO/DIA</div><div class="stat-sub">total diário</div></div>
      <div class="stat-card"><div class="stat-value" style="color:${pct>=85?'var(--green)':'var(--red)'};font-size:22px">${pct}%</div><div class="stat-label">PRESENÇA</div><div class="stat-sub">${tF} faltas</div></div>
    </div>
    ${cards||'<p style="text-align:center;color:var(--gray2)">SEM DADOS</p>'}`}

function rDiarias(){
  const fE=S.diariaEmp==='all'?S.empreiteiros:S.empreiteiros.filter(e=>e.id===S.diariaEmp);
  let allCols=[];fE.forEach(e=>{S.colaboradores.filter(c=>c.empreiteiro_id===e.id).forEach(c=>allCols.push(c))});
  allCols.sort((a,b)=>a.nome.localeCompare(b.nome));

  const dayDiarias=S.diarias.filter(d=>d.data===S.selectedDate);
  // Colaboradores já adicionados no dia
  const addedIds=dayDiarias.map(d=>d.colaborador_id);
  const addedCols=allCols.filter(c=>addedIds.includes(c.id));
  // Colaboradores disponíveis para adicionar (não adicionados ainda)
  const availCols=allCols.filter(c=>!addedIds.includes(c.id));

  let listHtml='';
  if(addedCols.length){
    listHtml=addedCols.map(c=>{
      const di=dayDiarias.find(x=>x.colaborador_id===c.id);
      const desc=di?.descricao||'';
      const emp=S.empreiteiros.find(e=>e.id===c.empreiteiro_id);
      return`<div class="list-item" style="flex-direction:column;align-items:stretch;gap:8px">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div style="flex:1"><div style="font-size:13px;font-weight:600">${c.nome}</div><div style="font-size:10px;color:var(--gray)">${c.funcao} — ${emp?.nome||'?'}</div></div>
          <button class="del-btn" data-diaria-rm="${c.id}" title="REMOVER">${ic('trash',16,'#f87171')}</button>
        </div>
        <textarea data-diaria-desc="${c.id}" placeholder="DESCREVA O SERVIÇO EXECUTADO..." style="background:var(--bg4);border:1px solid var(--border2);border-radius:8px;color:var(--white);padding:8px;font-size:12px;min-height:50px;resize:vertical;text-transform:uppercase">${desc}</textarea>
      </div>`;
    }).join('');
  }else{
    listHtml='<div style="text-align:center;padding:30px;color:var(--gray2);font-size:12px">NENHUM COLABORADOR ADICIONADO NESTE DIA</div>';
  }

  // Select para adicionar colaborador
  const addSelect=availCols.length?`<div style="display:flex;gap:6px;margin-bottom:14px">
    <select id="selDiariaCol" style="flex:1"><option value="">SELECIONAR COLABORADOR...</option>${availCols.map(c=>{const emp=S.empreiteiros.find(e=>e.id===c.empreiteiro_id);return`<option value="${c.id}">${c.nome} — ${c.funcao} (${emp?.nome||'?'})</option>`}).join('')}</select>
    <button class="add-btn" style="width:auto;padding:10px 16px" data-action="addDiaria">${ic('plus',16,'#000')}</button>
  </div>`:'<p style="font-size:11px;color:var(--gray2);margin-bottom:14px;text-align:center">TODOS COLABORADORES JÁ ADICIONADOS</p>';

  return`<div class="page fade-in">
    <h2 style="font-family:var(--font-display);font-size:18px;margin-bottom:14px">Controle de Diárias</h2>
    <div style="display:flex;gap:8px;margin-bottom:10px">${ic('calendar',16,'#c9a96e')}<input type="date" value="${S.selectedDate}" data-action="setDate" style="flex:1"></div>
    <div style="display:flex;gap:8px;margin-bottom:10px">${ic('calendar',16,'#c9a96e')}<input type="month" value="${S.selectedMonth}" data-action="setMonth" style="flex:1"></div>
    <select data-action="setDiariaEmp" style="margin-bottom:12px"><option value="all">TODOS OS EMPREITEIROS</option>${S.empreiteiros.map(e=>`<option value="${e.id}" ${S.diariaEmp===e.id?'selected':''}>${e.nome}</option>`).join('')}</select>
    <div class="section-title">ADICIONAR COLABORADOR</div>
    ${addSelect}
    <div style="display:flex;gap:8px;margin-bottom:14px"><div class="mini-stat"><div style="font-size:18px;font-weight:700;color:var(--gold)">${addedCols.length}</div><div style="font-size:9px;color:var(--gray)">DIÁRIAS HOJE</div></div></div>
    ${listHtml}
    <button class="action-btn" style="margin-top:16px" data-action="exportDiariasPdf">${ic('file',18,'#c9a96e')} EXPORTAR MEDIÇÃO MENSAL (PDF)</button>
  </div>`}

function exportDiariasPdf(){
  const{jsPDF}=window.jspdf;const doc=new jsPDF();
  const[y,m]=S.selectedMonth.split('-').map(Number);const days=dim(S.selectedMonth);
  const mn=['','JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'][m];
  const fE=S.diariaEmp==='all'?S.empreiteiros:S.empreiteiros.filter(e=>e.id===S.diariaEmp);

  doc.setFontSize(16);doc.setFont('helvetica','bold');
  doc.text('MEDIÇÃO DE DIÁRIAS — MENSAL',105,20,{align:'center'});
  doc.setFontSize(10);doc.setFont('helvetica','normal');
  doc.text('OBRA: CORÁ ARTHAUS — PENHA/SC',20,32);
  doc.text(`MÊS: ${mn}/${y}     EMISSÃO: ${fd(dk(new Date()))}`,20,38);
  doc.setDrawColor(200);doc.line(20,42,190,42);

  fE.forEach(emp=>{
    const empCols=S.colaboradores.filter(c=>c.empreiteiro_id===emp.id);
    if(!empCols.length)return;
    const empDiarias=S.diarias.filter(d=>empCols.some(c=>c.id===d.colaborador_id));
    if(!empDiarias.length)return;

    let tableData=[];
    empCols.forEach(c=>{
      const colDiarias=S.diarias.filter(d=>d.colaborador_id===c.id).sort((a,b)=>a.data.localeCompare(b.data));
      if(!colDiarias.length)return;
      tableData.push([{content:c.nome+' — '+c.funcao+(c.cpf?' — '+c.cpf:''),colSpan:3,styles:{fontStyle:'bold',fillColor:[40,40,40],textColor:[200,170,110],fontSize:8}}]);
      colDiarias.forEach(d=>{tableData.push([fd(d.data),dow(d.data),d.descricao||'—'])});
      tableData.push([{content:'TOTAL DIÁRIAS: '+colDiarias.length,colSpan:3,styles:{fontStyle:'bold',fontSize:8,halign:'right'}}]);
    });

    const totalEmpDias=empCols.reduce((a,c)=>a+S.diarias.filter(d=>d.colaborador_id===c.id).length,0);

    const curY=doc.lastAutoTable?doc.lastAutoTable.finalY+12:48;
    doc.setFontSize(11);doc.setFont('helvetica','bold');
    doc.text(`${emp.nome} — TOTAL: ${totalEmpDias} DIÁRIAS`,20,curY);
    doc.autoTable({startY:curY+4,head:[['DATA','DIA','SERVIÇO EXECUTADO']],body:tableData,
      theme:'grid',headStyles:{fillColor:[30,30,30],textColor:255,fontSize:8},bodyStyles:{fontSize:7},
      columnStyles:{0:{cellWidth:25},1:{cellWidth:15}}
    });
  });

  const fy2=doc.lastAutoTable?doc.lastAutoTable.finalY+20:60;
  doc.setFontSize(10);doc.setFont('helvetica','normal');
  doc.text('ENG. RESPONSÁVEL: ________________________________',20,fy2);
  doc.text('ASSINATURA EMPREITEIRO: ________________________________',20,fy2+10);
  doc.text(`DATA: ____/____/________`,20,fy2+20);

  doc.save(`MEDICAO_DIARIAS_${mn}_${y}.pdf`);
  toast('PDF MEDIÇÃO EXPORTADO');
}

  return`<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px">
    <input type="text" placeholder="NOME COMPLETO *" data-field="fColNome" value="${S.fColNome}">

    <div style="display:flex;gap:6px"><select data-field="fColEmp"><option value="">EMPREITEIRO *</option>${S.empreiteiros.map(e=>`<option value="${e.id}" ${S.fColEmp===e.id?'selected':''}>${e.nome}</option>`).join('')}</select><select data-field="fColFunc"><option value="">FUNÇÃO *</option>${S.funcoes.map(f=>`<option value="${f.nome}" ${S.fColFunc===f.nome?'selected':''}>${f.nome}</option>`).join('')}</select></div>
    <button class="add-btn" data-action="addCol">${ic('plus',14,'#000')} ADICIONAR COLABORADOR</button></div>
  ${S.empreiteiros.map(emp=>{const cols=S.colaboradores.filter(c=>c.empreiteiro_id===emp.id);return`<div class="group-header">${emp.nome} (${cols.length})</div>${cols.length?cols.map(c=>`<div class="list-item" style="margin-bottom:4px"><div style="flex:1"><div style="font-size:12px">${c.nome}</div><div style="font-size:10px;color:var(--gray)">${c.funcao}${c.cpf?' — '+c.cpf:''}</div></div><button class="del-btn" data-dc="${c.id}">${ic('trash',14,'#f87171')}</button></div>`).join(''):'<p style="font-size:11px;color:var(--gray2);margin-bottom:12px">—</p>'}`}).join('')}`}

function rCadFunc(){

  <div class="prev-total"><span style="font-size:12px;color:var(--gray);font-weight:600">TOTAL/DIA</span><span id="prevTotal" style="font-size:22px;font-weight:700;color:var(--gold);font-family:var(--font-display)">${total}</span></div>`}

// ============================================================
// PDF EXPORT
// ============================================================
function exportPdf(){
  const{jsPDF}=window.jspdf;const doc=new jsPDF();
  const[y,m]=S.selectedMonth.split('-').map(Number);const days=dim(S.selectedMonth);
  const mn=['','JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'][m];
  doc.setFontSize(16);doc.setFont('helvetica','bold');
  doc.text('ATA DE FECHAMENTO — HISTOGRAMA MENSAL',105,20,{align:'center'});
  doc.setFontSize(10);doc.setFont('helvetica','normal');
  doc.text(`OBRA: CORÁ ARTHAUS — PENHA/SC`,20,32);
  doc.text(`INCORPORADORA: ARTHAUS INCORPORADORA DESIGN`,20,38);
  doc.text(`MÊS: ${mn}/${y}     EMISSÃO: ${fd(dk(new Date()))}`,20,44);
  doc.setDrawColor(200);doc.line(20,48,190,48);

  // Summary table - respects filter
  const pdfEmps=fEmp();
  let tableData=[];let tE=0,tPv=0,tP=0,tF=0,tM=0;
  pdfEmps.forEach(emp=>{
    const cols=S.colaboradores.filter(c=>c.empreiteiro_id===emp.id);
    let sP=0,sF=0,sM=0,dc=0;
    for(let d=1;d<=days;d++){const dkk=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const dch=S.chamadas.filter(c=>c.data===dkk);if(!dch.length)continue;dc++;cols.forEach(c=>{const ch=dch.find(x=>x.colaborador_id===c.id);if(ch?.status==='P')sP++;else if(ch?.status==='F')sF++;else if(ch?.status==='M')sM++})}
    const ef=sP+sM*.5,pv=(S.previsto.find(p=>p.empreiteiro_id===emp.id)?.quantidade||0)*dc;
    tE+=ef;tPv+=pv;tP+=sP;tF+=sF;tM+=sM;
    const pct=(sP+sF+sM)>0?Math.round(sP/(sP+sF+sM)*100)+'%':'—';
    tableData.push([emp.nome,dc,pv,ef,sP,sF,sM,pct,(ef-pv>=0?'+':'')+(ef-pv)]);
  });
  tableData.push(['TOTAL','',tPv,tE,tP,tF,tM,tP+tF+tM>0?Math.round(tP/(tP+tF+tM)*100)+'%':'—',(tE-tPv>=0?'+':'')+(tE-tPv)]);

  doc.setFontSize(11);doc.setFont('helvetica','bold');doc.text('1. RESUMO POR EMPREITEIRO',20,56);
  doc.autoTable({startY:60,head:[['EMPREITEIRO','DIAS','PREV.','REAL.','PRES.','FALTAS','½ PER.','%','DESVIO']],body:tableData,
    theme:'grid',headStyles:{fillColor:[40,40,40],textColor:255,fontSize:8},bodyStyles:{fontSize:8},
    footStyles:{fillColor:[30,30,30],textColor:[200,170,110]},
    didParseCell:function(data){if(data.row.index===tableData.length-1){data.cell.styles.fontStyle='bold';data.cell.styles.fillColor=[30,30,30];data.cell.styles.textColor=[200,170,110]}}
  });

  // Daily detail
  const fy=doc.lastAutoTable.finalY+10;
  doc.setFontSize(11);doc.setFont('helvetica','bold');doc.text('2. DETALHAMENTO DIÁRIO',20,fy);
  let dailyData=[];
  for(let d=1;d<=days;d++){const dkk=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const dch=S.chamadas.filter(c=>c.data===dkk);if(!dch.length)continue;
    let tr=0;const pdfCols=fCol();pdfCols.forEach(c=>{const ch=dch.find(x=>x.colaborador_id===c.id);if(ch?.status==='P')tr+=1;else if(ch?.status==='M')tr+=.5});
    let tp=0;pdfEmps.forEach(e=>{const p=S.previsto.find(pr=>pr.empreiteiro_id===e.id);tp+=(p?.quantidade||0)});const dv=tr-tp;
    dailyData.push([fd(dkk),dow(dkk),tp,tr,(dv>=0?'+':'')+dv])}
  doc.autoTable({startY:fy+4,head:[['DATA','DIA','PREV.','REAL.','DESVIO']],body:dailyData,theme:'grid',headStyles:{fillColor:[40,40,40],textColor:255,fontSize:8},bodyStyles:{fontSize:8}});

  // 3. Ocorrências (faltas e meio período com motivo)
  const pdfCols2=fCol();
  let ocorrData=[];
  S.chamadas.filter(c=>(c.status==='F'||c.status==='M')&&pdfCols2.some(col=>col.id===c.colaborador_id)).sort((a,b)=>a.data.localeCompare(b.data)).forEach(ch=>{
    const col=pdfCols2.find(c=>c.id===ch.colaborador_id);if(!col)return;
    const emp=S.empreiteiros.find(e=>e.id===col.empreiteiro_id);
    ocorrData.push([fd(ch.data),col.nome,col.funcao,emp?.nome||'—',ch.status==='F'?'FALTA':'½ PERÍODO',ch.motivo||'—']);
  });
  if(ocorrData.length){
    const fy3=doc.lastAutoTable.finalY+10;
    doc.setFontSize(11);doc.setFont('helvetica','bold');doc.text('3. OCORRÊNCIAS (FALTAS E ½ PERÍODO)',20,fy3);
    doc.autoTable({startY:fy3+4,head:[['DATA','COLABORADOR','FUNÇÃO','EMPREITEIRO','STATUS','MOTIVO']],body:ocorrData,
      theme:'grid',headStyles:{fillColor:[40,40,40],textColor:255,fontSize:7},bodyStyles:{fontSize:7},
      didParseCell:function(data){if(data.section==='body'){const v=data.cell.raw;if(v==='FALTA')data.cell.styles.textColor=[220,50,50];else if(v==='½ PERÍODO')data.cell.styles.textColor=[200,160,30]}}
    });
  }

  // Signature
  const fy2=doc.lastAutoTable.finalY+20;
  doc.setFontSize(10);doc.setFont('helvetica','normal');
  doc.text('ENG. RESPONSÁVEL: ________________________________',20,fy2);
  doc.text('ASSINATURA: ________________________________',20,fy2+10);
  doc.text('ASSINATURA EMPREITEIRO: ________________________________',20,fy2+20);
  doc.text(`DATA: ____/____/________`,20,fy2+30);

  doc.save(`ATA_HISTOGRAMA_${mn}_${y}.pdf`);
  toast('PDF EXPORTADO');
}

// Export PDF diário com nome e função dos colaboradores presentes
function exportDailyPdf(){
  const{jsPDF}=window.jspdf;const doc=new jsPDF();
  const d=S.selectedDate;
  const dayChs=S.chamadas.filter(c=>c.data===d);
  if(!dayChs.length){toast('SEM CHAMADA NESTE DIA',true);return}

  doc.setFontSize(16);doc.setFont('helvetica','bold');
  doc.text('RELATÓRIO DE EFETIVO DIÁRIO',105,20,{align:'center'});
  doc.setFontSize(10);doc.setFont('helvetica','normal');
  doc.text(`OBRA: CORÁ ARTHAUS — PENHA/SC`,20,32);
  doc.text(`DATA: ${fd(d)} — ${dow(d)}`,20,38);
  doc.text(`EMISSÃO: ${fd(dk(new Date()))}`,20,44);
  doc.setDrawColor(200);doc.line(20,48,190,48);

  // Totais gerais - respects filter
  const dailyPdfEmps=fEmp();
  const dailyPdfCols=fCol();
  let totalP=0,totalF=0,totalM=0;
  dailyPdfCols.forEach(c=>{const ch=dayChs.find(x=>x.colaborador_id===c.id);if(ch?.status==='P')totalP++;else if(ch?.status==='F')totalF++;else if(ch?.status==='M')totalM++});
  const totalEf=totalP+totalM*0.5;
  let totalPrev=0;dailyPdfEmps.forEach(e=>{const p=S.previsto.find(pr=>pr.empreiteiro_id===e.id);totalPrev+=(p?.quantidade||0)});

  doc.setFontSize(10);doc.setFont('helvetica','bold');
  doc.text(`EFETIVO: ${totalEf}    PREVISTO: ${totalPrev}    DESVIO: ${totalEf-totalPrev>=0?'+':''}${totalEf-totalPrev}    PRESENÇA: ${totalP}    FALTAS: ${totalF}    ½ PER.: ${totalM}`,20,56);

  // Tabela por empreiteiro
  let tableData=[];
  dailyPdfEmps.forEach(emp=>{
    const empCols=S.colaboradores.filter(c=>c.empreiteiro_id===emp.id);
    const presentCols=empCols.filter(c=>{const ch=dayChs.find(x=>x.colaborador_id===c.id);return ch&&(ch.status==='P'||ch.status==='M')});
    const absentCols=empCols.filter(c=>{const ch=dayChs.find(x=>x.colaborador_id===c.id);return ch&&ch.status==='F'});

    if(presentCols.length||absentCols.length){
      // Header row for empreiteiro
      tableData.push([{content:emp.nome,colSpan:5,styles:{fontStyle:'bold',fillColor:[40,40,40],textColor:[200,170,110],fontSize:9}}]);
      presentCols.forEach(c=>{const ch=dayChs.find(x=>x.colaborador_id===c.id);tableData.push([c.nome,c.funcao,c.cpf||'—',ch.status==='P'?'PRESENTE':'½ PERÍODO',ch.motivo||''])});
      absentCols.forEach(c=>{const ch=dayChs.find(x=>x.colaborador_id===c.id);tableData.push([c.nome,c.funcao,c.cpf||'—','FALTA',ch?.motivo||''])});
    }
  });

  doc.autoTable({startY:62,head:[['NOME','FUNÇÃO','CPF','STATUS','MOTIVO']],body:tableData,
    theme:'grid',headStyles:{fillColor:[30,30,30],textColor:255,fontSize:8},bodyStyles:{fontSize:8},
    didParseCell:function(data){
      if(data.section==='body'){
        const val=data.cell.raw;
        if(val==='FALTA'){data.cell.styles.textColor=[220,50,50]}
        else if(val==='½ PERÍODO'){data.cell.styles.textColor=[200,160,30]}
        else if(val==='PRESENTE'){data.cell.styles.textColor=[50,180,80]}
      }
    }
  });

  // Resumo por função
  const fy=doc.lastAutoTable.finalY+10;
  doc.setFontSize(11);doc.setFont('helvetica','bold');doc.text('RESUMO POR FUNÇÃO',20,fy);
  const funcSummary={};
  dailyPdfCols.forEach(c=>{
    const ch=dayChs.find(x=>x.colaborador_id===c.id);
    if(ch&&(ch.status==='P'||ch.status==='M')){
      funcSummary[c.funcao]=(funcSummary[c.funcao]||0)+(ch.status==='P'?1:0.5);
    }
  });
  const funcRows=Object.entries(funcSummary).sort((a,b)=>b[1]-a[1]).map(([f,c])=>[f,c]);
  funcRows.push([{content:'TOTAL',styles:{fontStyle:'bold'}},{content:totalEf,styles:{fontStyle:'bold'}}]);
  doc.autoTable({startY:fy+4,head:[['FUNÇÃO','EFETIVO']],body:funcRows,theme:'grid',headStyles:{fillColor:[40,40,40],textColor:255,fontSize:8},bodyStyles:{fontSize:8},columnStyles:{1:{halign:'center'}}});

  const fy2=doc.lastAutoTable.finalY+16;
  doc.setFontSize(10);doc.setFont('helvetica','normal');
  doc.text('ENG. RESPONSÁVEL: ________________________________',20,fy2);
  doc.text('ASSINATURA EMPREITEIRO: ________________________________',20,fy2+10);

  doc.save(`EFETIVO_DIARIO_${d}.pdf`);
  toast('PDF DIÁRIO EXPORTADO');
}

// ============================================================
// EVENTS
// ============================================================
function bindEvents(){
  document.querySelectorAll('[data-nav]').forEach(el=>{el.onclick=()=>{S.page=el.dataset.nav;render()}});
  document.querySelectorAll('[data-tab]').forEach(el=>{el.onclick=()=>{S.tab=el.dataset.tab;render()}});
  document.querySelectorAll('[data-ct]').forEach(el=>{el.onclick=()=>{S.cadTab=el.dataset.ct;render()}});
  document.querySelectorAll('[data-action="setDate"]').forEach(el=>{el.onchange=async()=>{S.selectedDate=el.value;const nm=el.value.slice(0,7);if(nm!==S.selectedMonth){S.selectedMonth=nm;await loadMonth()}await autoPopulateDay(S.selectedDate);render()}});
  document.querySelectorAll('[data-action="setMonth"]').forEach(el=>{el.onchange=async()=>{S.selectedMonth=el.value;await loadMonth();render()}});
  document.querySelectorAll('[data-action="setEmp"]').forEach(el=>{el.onchange=()=>{S.selEmp=el.value;render()}});
  document.querySelectorAll('[data-emp-toggle]').forEach(el=>{el.onclick=()=>{const v=el.dataset.empToggle;if(v==='all'){S.biEmpSel=[];}else{const i=S.biEmpSel.indexOf(v);if(i>=0)S.biEmpSel.splice(i,1);else S.biEmpSel.push(v);}render()}});

  // Chamada — adicionar colaborador ao dia (opt-in)
  document.querySelectorAll('[data-action="addToDay"]').forEach(el=>{el.onclick=async()=>{
    const sel=document.getElementById('selAddCol');if(!sel||!sel.value){toast('SELECIONE UM COLABORADOR',true);return}
    const cid=sel.value,d=S.selectedDate;
    try{
      await api.upsertChamada({data:d,colaborador_id:cid,status:'P',motivo:''});
      const idx=S.chamadas.findIndex(c=>c.data===d&&c.colaborador_id===cid);
      if(idx>=0){S.chamadas[idx].status='P';S.chamadas[idx].motivo=''}else S.chamadas.push({data:d,colaborador_id:cid,status:'P',motivo:''});
      render();
    }catch(e){toast('ERRO: '+e.message,true)}
  }});

  // Chamada — remover colaborador do dia
  document.querySelectorAll('[data-ch-rm]').forEach(el=>{el.onclick=async()=>{
    const cid=el.dataset.chRm,d=S.selectedDate;
    try{await api.delChamada(d,cid);S.chamadas=S.chamadas.filter(x=>!(x.data===d&&x.colaborador_id===cid));render()}
    catch(e){toast('ERRO: '+e.message,true)}
  }});

  // Chamada — alterar status P/½/F
  document.querySelectorAll('[data-ch]').forEach(el=>{el.onclick=async()=>{
    const cid=el.dataset.ch,st=el.dataset.st,d=S.selectedDate,cur=chStatus(cid,d);
    try{
      await api.upsertChamada({data:d,colaborador_id:cid,status:st,motivo:cur===st?chMotivo(cid,d):''});
      const idx=S.chamadas.findIndex(c=>c.data===d&&c.colaborador_id===cid);
      if(idx>=0){S.chamadas[idx].status=st;if(cur!==st)S.chamadas[idx].motivo=''}
      else S.chamadas.push({data:d,colaborador_id:cid,status:st,motivo:''});
      render();
    }catch(e){toast('ERRO: '+e.message,true)}
  }});

  // Motivo de falta/meio período
  document.querySelectorAll('[data-motivo]').forEach(el=>{el.onblur=async()=>{
    const cid=el.dataset.motivo,d=S.selectedDate,mot=el.value.toUpperCase();
    await api.upsertChamada({data:d,colaborador_id:cid,status:chStatus(cid,d),motivo:mot});
    const idx=S.chamadas.findIndex(x=>x.data===d&&x.colaborador_id===cid);if(idx>=0)S.chamadas[idx].motivo=mot;
  }});

  // markAll — opera só sobre colaboradores já adicionados no dia
  document.querySelectorAll('[data-action="markAll"]').forEach(el=>{el.onclick=async()=>{
    const st=el.dataset.status,d=S.selectedDate;
    const addedIds=S.chamadas.filter(x=>x.data===d).map(x=>x.colaborador_id);
    let cols=S.colaboradores.filter(c=>addedIds.includes(c.id));
    if(S.selEmp!=='all')cols=cols.filter(c=>c.empreiteiro_id===S.selEmp);
    try{
      for(const c of cols){
        if(st){await api.upsertChamada({data:d,colaborador_id:c.id,status:st});const idx=S.chamadas.findIndex(x=>x.data===d&&x.colaborador_id===c.id);if(idx>=0)S.chamadas[idx].status=st;else S.chamadas.push({data:d,colaborador_id:c.id,status:st})}
        else{await api.delChamada(d,c.id);S.chamadas=S.chamadas.filter(x=>!(x.data===d&&x.colaborador_id===c.id))}
      }
      toast(st?'TODOS PRESENTES':'REMOVIDOS');
    }catch(e){toast('ERRO: '+e.message,true)}
  }});

  // Fields — force uppercase (except selects)
  document.querySelectorAll('[data-field]').forEach(el=>{
    if(el.tagName==='SELECT'){
      el.onchange=()=>{S[el.dataset.field]=el.value;render()};
    }else{
      el.oninput=()=>{if(el.dataset.mask==='cnpj')el.value=fmtCnpj(el.value);else if(el.dataset.mask==='cpf')el.value=fmtCpf(el.value);else el.value=el.value.toUpperCase();S[el.dataset.field]=el.value};
      el.onchange=()=>{S[el.dataset.field]=el.value};
    }
  });
  // Add Empreiteiro — CNPJ e especialidade obrigatórios
  document.querySelectorAll('[data-action="addEmp"]').forEach(el=>{el.onclick=async()=>{
    if(!S.fNome.trim()){toast('INFORME O NOME',true);return}
    const cnpj=clean(S.fCnpj||'');if(!cnpj||cnpj.length!==14){toast('CNPJ OBRIGATÓRIO (14 DÍGITOS)',true);return}
    if(!S.fEsp.trim()){toast('INFORME A ESPECIALIDADE',true);return}
    if(S.empreiteiros.find(e=>clean(e.cnpj||'')===cnpj)){toast('CNPJ JÁ CADASTRADO',true);return}
    if(S.empreiteiros.find(e=>e.nome===S.fNome.trim().toUpperCase())){toast('NOME JÁ CADASTRADO',true);return}
    try{await api.addEmpreiteiro({id:'emp'+Date.now(),nome:S.fNome.trim().toUpperCase(),especialidade:S.fEsp.trim().toUpperCase(),cnpj:S.fCnpj||''});S.fNome='';S.fEsp='';S.fCnpj='';S.empreiteiros=await api.getEmpreiteiros();toast('EMPREITEIRO ADICIONADO')}catch(e){toast('ERRO',true)}}});
  document.querySelectorAll('[data-de]').forEach(el=>{el.onclick=async()=>{try{await api.delEmpreiteiro(el.dataset.de);S.empreiteiros=await api.getEmpreiteiros();S.colaboradores=await api.getColaboradores();render()}catch(e){toast('ERRO',true)}}});

  // Add Colaborador
  document.querySelectorAll('[data-action="addCol"]').forEach(el=>{el.onclick=async()=>{
    const nome=(S.fColNome||'').trim().toUpperCase(),cpf=clean(S.fColCpf||''),empId=S.fColEmp,funcao=S.fColFunc;
    if(!nome){toast('INFORME O NOME',true);return}if(!cpf||cpf.length!==11){toast('CPF OBRIGATÓRIO (11 DÍGITOS)',true);return}
    if(!empId){toast('SELECIONE EMPREITEIRO',true);return}if(!funcao){toast('SELECIONE FUNÇÃO',true);return}
    if(S.colaboradores.find(c=>clean(c.cpf||'')===cpf)){toast('CPF JÁ CADASTRADO',true);return}
    try{await api.addColaborador({id:'col'+Date.now(),nome,empreiteiro_id:empId,funcao,cpf:S.fColCpf||''});S.fColNome='';S.fColCpf='';S.colaboradores=await api.getColaboradores();toast('COLABORADOR ADICIONADO')}catch(e){toast('ERRO',true)}}});
  document.querySelectorAll('[data-dc]').forEach(el=>{el.onclick=async()=>{try{await api.delColaborador(el.dataset.dc);S.colaboradores=await api.getColaboradores();render()}catch(e){toast('ERRO',true)}}});

  // Funções
  document.querySelectorAll('[data-action="addFunc"]').forEach(el=>{el.onclick=async()=>{if(!S.fFuncNome?.trim())return;const n=S.fFuncNome.trim().toUpperCase();if(S.funcoes.find(f=>f.nome===n)){toast('JÁ EXISTE',true);return}try{await api.addFuncao(n);S.fFuncNome='';S.funcoes=await api.getFuncoes();toast('ADICIONADA')}catch(e){toast('ERRO',true)}}});
  document.querySelectorAll('[data-df]').forEach(el=>{el.onclick=async()=>{try{await api.delFuncao(el.dataset.df);S.funcoes=await api.getFuncoes();render()}catch(e){toast('ERRO',true)}}});

  // Previsto — salva com debounce no oninput e também no blur
  const _prevTimers={};
  const _savePrev=async(el)=>{
    const empId=el.dataset.pe,qty=parseInt(el.value)||0;
    el.style.borderColor='var(--gold)';
    try{
      await api.upsertPrevisto({mes:S.selectedMonth,empreiteiro_id:empId,quantidade:qty});
      const idx=S.previsto.findIndex(p=>p.empreiteiro_id===empId&&p.mes===S.selectedMonth);
      if(idx>=0)S.previsto[idx].quantidade=qty;
      else S.previsto.push({id:'prev'+Date.now()+empId,mes:S.selectedMonth,empreiteiro_id:empId,quantidade:qty});
      if(el.isConnected)el.style.borderColor='var(--green)';
      const totalEl=document.getElementById('prevTotal');
      if(totalEl)totalEl.textContent=S.previsto.reduce((a,p)=>a+(p.quantidade||0),0);
      setTimeout(()=>{if(el.isConnected)el.style.borderColor='var(--border2)'},1500);
    }catch(e){if(el.isConnected)el.style.borderColor='var(--red)';toast('ERRO AO SALVAR PREVISTO: '+(e.message||String(e)),true)}
  };
  document.querySelectorAll('[data-pe]').forEach(el=>{
    el.oninput=()=>{clearTimeout(_prevTimers[el.dataset.pe]);el.style.borderColor='var(--gold)';_prevTimers[el.dataset.pe]=setTimeout(()=>_savePrev(el),800)};
    el.onblur=()=>{clearTimeout(_prevTimers[el.dataset.pe]);_savePrev(el)};
  });

  document.querySelectorAll('[data-action="exportPdf"]').forEach(el=>{el.onclick=exportPdf});
  document.querySelectorAll('[data-action="exportDailyPdf"]').forEach(el=>{el.onclick=exportDailyPdf});
  document.querySelectorAll('[data-action="exportDiariasPdf"]').forEach(el=>{el.onclick=exportDiariasPdf});
  document.querySelectorAll('[data-action="testDb"]').forEach(el=>{el.onclick=async()=>{
    const res=document.getElementById('dbTestResult');if(res)res.textContent='TESTANDO...';
    const r=await api.testConnection();
    if(res)res.innerHTML=r.ok?
      `<span style="color:var(--green)">CONEXÃO OK (${r.status})</span><br>Resposta: ${r.body}`:
      `<span style="color:var(--red)">ERRO (${r.status})</span><br>${r.body}`;
  }});
  document.querySelectorAll('[data-action="setDiariaEmp"]').forEach(el=>{el.onchange=()=>{S.diariaEmp=el.value;render()}});

  // Diárias — adicionar via select, remover, descrição
  document.querySelectorAll('[data-action="addDiaria"]').forEach(el=>{el.onclick=async()=>{
    const sel=document.getElementById('selDiariaCol');if(!sel||!sel.value){toast('SELECIONE UM COLABORADOR',true);return}
    const cid=sel.value,d=S.selectedDate;
    const nd={data:d,colaborador_id:cid,descricao:''};
    try{await api.upsertDiaria(nd);S.diarias.push(nd);render();toast('COLABORADOR ADICIONADO')}catch(e){toast('ERRO',true)}
  }});
  document.querySelectorAll('[data-diaria-rm]').forEach(el=>{el.onclick=async()=>{
    const cid=el.dataset.diariaRm,d=S.selectedDate;
    try{await api.delDiaria(d,cid);S.diarias=S.diarias.filter(x=>!(x.data===d&&x.colaborador_id===cid));render();toast('REMOVIDO')}catch(e){toast('ERRO',true)}
  }});
  document.querySelectorAll('[data-diaria-desc]').forEach(el=>{el.onblur=async()=>{
    const cid=el.dataset.diariaDesc,d=S.selectedDate,desc=el.value.toUpperCase();
    await api.upsertDiaria({data:d,colaborador_id:cid,descricao:desc});
    const idx=S.diarias.findIndex(x=>x.data===d&&x.colaborador_id===cid);if(idx>=0)S.diarias[idx].descricao=desc;
  }});
}

loadData();
</script>
</body>
</html>
